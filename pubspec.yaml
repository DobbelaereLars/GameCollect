name: gamecollect
description: 'GameCollect is een Flutter-app waarmee gebruikers hun fysieke en digitale gamecollectie kunnen beheren, organiseren en opvolgen. De app focust op een overzichtelijke covergrid, backlog-status, persoonlijke tags en het bijhouden van voortgang richting het uitspelen of 100% completen van games.'
publish_to: 'none'
version: 0.9.5+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  lucide_icons_flutter: ^3.1.10
  flutter_dotenv: ^6.0.0
  http: ^1.6.0
  image_picker: ^1.2.1
  googlelens: ^0.0.1
  webview_flutter: ^4.13.1
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  share_plus: ^12.0.2
  package_info_plus: ^9.0.1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.6
  connectivity_plus: ^6.0.5
  shared_preferences: ^2.3.2
  flutter_image_compress: ^2.4.0
  cached_network_image: ^3.4.1
  flutter_secure_storage: ^10.0.0
  provider: ^6.1.2
  confetti: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - shorebird.yaml
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Manrope-Light.ttf
          weight: 300
        - asset: assets/fonts/Manrope-Regular.ttf
          weight: 400
        - asset: assets/fonts/Manrope-Medium.ttf
          weight: 500
        - asset: assets/fonts/Manrope-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Manrope-Bold.ttf
          weight: 700
        - asset: assets/fonts/Manrope-ExtraBold.ttf
          weight: 800

flutter_launcher_icons:
  android: 'launcher_icon'
  image_path: 'assets/icon/GameCollect_Icon.png'
  windows:
    generate: true
    image_path: 'assets/icon/GameCollect_Icon.png'
    icon_size: 48
